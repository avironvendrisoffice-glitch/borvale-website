<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--forest:#1D4033;--gold:#9E8142;--gold-light:#B8A055;--sage:#3A6B54;--cream:#F5F1E8;--ink:#1a2620;--paper:#FBFAF6}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Lato',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:40;background:rgba(21,48,40,.96);backdrop-filter:blur(6px);border-bottom:1px solid rgba(158,129,66,.4)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
  .topbar .mini{display:flex;align-items:center;gap:10px}
  .topbar .mini img{height:34px;width:34px}
  .topbar .mini {font-family:'Cinzel',serif;color:var(--cream);letter-spacing:.2em;font-size:1rem;margin-left:.2em}
  .langsel{display:flex;align-items:center;gap:6px}
  .langsel select{background:#13291f;color:var(--cream);border:1px solid rgba(158,129,66,.5);border-radius:7px;padding:6px 10px;font-family:'Lato';font-size:.82rem;cursor:pointer}

  header.hero{position:relative;background:radial-gradient(circle at 50% 120%,rgba(158,129,66,.18),transparent 60%),linear-gradient(160deg,#16352a,var(--forest) 55%,#122a21);color:var(--cream);text-align:center;padding:54px 24px 66px;overflow:hidden}
  header.hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .crest{width:118px;height:118px;margin:0 auto 14px;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,.35))}
  .brandname{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(2.6rem,7vw,4.4rem);letter-spacing:.14em;margin-left:.14em;line-height:1}
  .brand-rule{display:flex;align-items:center;justify-content:center;gap:14px;margin:16px auto 20px;max-width:340px;color:var(--gold-light)}
  .brand-rule::before,.brand-rule::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold-light))}
  .brand-rule::after{background:linear-gradient(90deg,var(--gold-light),transparent)}
  .brand-rule span{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.42em;margin-left:.42em;white-space:nowrap}
  .tagline{font-size:clamp(1.02rem,2.4vw,1.26rem);font-weight:300;max-width:640px;margin:0 auto;color:#eae3d4}
  .tagline strong{color:var(--gold-light);font-weight:400}

  /* filters */
  .filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:28px 24px 0}
  .filters button{font-family:'Lato';font-size:.82rem;font-weight:700;letter-spacing:.04em;color:var(--forest);background:#fff;border:1px solid #ddd6c4;border-radius:30px;padding:9px 20px;cursor:pointer;transition:all .2s}
  .filters button:hover{border-color:var(--gold)}
  .filters button.active{background:var(--forest);color:var(--cream);border-color:var(--forest)}

  main{padding:0 0 40px}
  section.shelf{padding:48px 0 8px}
  .shelf-head{display:flex;align-items:baseline;gap:18px;margin-bottom:28px}
  .shelf-head h2{font-family:'Cinzel',serif;font-weight:600;color:var(--forest);font-size:clamp(1.5rem,3.4vw,2.1rem);letter-spacing:.06em;white-space:nowrap}
  .shelf-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  .shelf-head .count{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);white-space:nowrap}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:26px}
  .card{position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid #e7e2d4;border-radius:14px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s}
  .card:hover{transform:translateY(-6px);box-shadow:0 16px 34px -16px rgba(29,64,51,.45);border-color:var(--gold)}
  .card .thumb{aspect-ratio:1/1;background:#15302a center/cover no-repeat;display:flex;align-items:center;justify-content:center}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .thumb .ph{opacity:.5;width:54px;height:54px}
  .nichetag{position:absolute;top:12px;left:12px;z-index:2;background:var(--gold);color:#2a2113;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:20px}
  .card .body{padding:18px;display:flex;flex-direction:column;flex:1}
  .card h3{font-family:'Cinzel',serif;font-weight:500;font-size:1.02rem;color:var(--forest);line-height:1.3;margin-bottom:6px}
  .card p{font-size:.85rem;color:#5a6660;font-weight:300;margin-bottom:16px;flex:1}
  .card a.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--forest);color:var(--cream);text-decoration:none;font-size:.82rem;font-weight:700;letter-spacing:.04em;padding:11px 14px;border-radius:8px;transition:background .2s}
  .card a.btn:hover{background:var(--gold);color:#2a2113}
  .card a.btn.soon{background:#b8b09a;cursor:not-allowed;pointer-events:none}
  .card a.btn svg{width:14px;height:14px}

  footer{margin-top:50px;background:var(--forest);color:#cdd6cf;text-align:center;padding:46px 24px;position:relative}
  footer::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  footer .fcrest{width:58px;height:58px;margin:0 auto 14px;display:block;opacity:.95}
  footer .fname{font-family:'Cinzel',serif;letter-spacing:.24em;margin-left:.24em;color:var(--cream);font-size:1.15rem;margin-bottom:8px}
  footer .fmotto{font-size:.82rem;font-style:italic;color:var(--gold-light);margin-bottom:20px}
  footer .flinks{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
  footer .flinks button{background:none;border:none;color:#cdd6cf;font-family:'Lato';font-size:.82rem;cursor:pointer;padding:4px 10px;border-bottom:1px solid transparent}
  footer .flinks button:hover{color:var(--gold-light);border-color:var(--gold-light)}
  footer .fnote{font-size:.74rem;color:#9fb0a6;max-width:560px;margin:0 auto;line-height:1.6}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(10,20,16,.62);backdrop-filter:blur(3px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--paper);max-width:760px;width:100%;border-radius:14px;border-top:5px solid var(--gold);padding:36px 38px 40px;position:relative;box-shadow:0 30px 70px -20px rgba(0,0,0,.5)}
  .modal h2{font-family:'Cinzel',serif;color:var(--forest);font-size:1.5rem;margin-bottom:18px;letter-spacing:.04em}
  .modal h3{font-family:'Cinzel',serif;color:var(--forest);font-size:1.05rem;margin:22px 0 8px}
  .modal p,.modal li{font-size:.9rem;color:#3a4540;margin-bottom:10px;line-height:1.7}
  .modal ul{padding-left:20px;margin-bottom:10px}
  .modal .ph{color:#b03b2e;font-weight:700}
  .modal .closex{position:absolute;top:16px;right:18px;background:none;border:none;font-size:1.6rem;color:var(--sage);cursor:pointer;line-height:1}
  .modal .langnote{font-size:.78rem;color:#8a8064;font-style:italic;margin-bottom:18px}

  /* cookie banner */
  .cookie{position:fixed;left:18px;right:18px;bottom:18px;z-index:70;background:#13291f;color:#e6ded0;border:1px solid rgba(158,129,66,.55);border-radius:14px;padding:18px 20px;display:none;gap:16px;align-items:center;max-width:880px;margin:0 auto;box-shadow:0 18px 40px -14px rgba(0,0,0,.55)}
  .cookie.show{display:flex;flex-wrap:wrap}
  .cookie p{font-size:.84rem;flex:1;min-width:240px;line-height:1.55;margin:0}
  .cookie .cbtns{display:flex;gap:10px;align-items:center}
  .cookie button{font-family:'Lato';font-weight:700;font-size:.82rem;border-radius:8px;padding:10px 18px;cursor:pointer;border:1px solid transparent}
  .cookie .ok{background:var(--gold);color:#2a2113}
  .cookie .ok:hover{background:var(--gold-light)}
  .cookie .lnk{background:none;color:var(--gold-light);border:1px solid rgba(158,129,66,.5)}

  @media (max-width:560px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
    .card .body{padding:14px}.card h3{font-size:.9rem}
    section.shelf{padding:34px 0 4px}
    .modal{padding:28px 22px 32px}
    .topbar .mini span{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>

/* ---- Amazon marketplace routing ----
   The selected language decides the target Amazon store.
   English defaults to amazon.com (US focus). A visitor whose browser
   region is GB is routed to amazon.co.uk on first load.
   - Full product links (…/dp/ASIN…) are automatically rewritten to the
     local domain.
   - Amazon short links (a.co/…) cannot be rewritten; they stay as is and
     rely on Amazon OneLink / Amazon's own nearest-store redirect.
   - A design may also carry per-market links as an object, e.g.
       link:{ com:"…", de:"…", "co.uk":"…" }
     in which case the exact market link is used when present. */
const LANG_TLD = { en:"com", de:"de", fr:"fr", it:"it", es:"es", ja:"co.jp" };
let marketTLD = "com"; // current target, set on load + on language change

function detectInitialMarket(navLang){
  const l = (navLang||"en").toLowerCase();
  if(l.startsWith("en-gb")||l==="en-ie") return "co.uk";
  if(l.startsWith("de")) return "de";
  if(l.startsWith("fr")) return "fr";
  if(l.startsWith("it")) return "it";
  if(l.startsWith("es")) return "es";
  if(l.startsWith("ja")) return "co.jp";
  return "com";
}

function resolveLink(d){
  if(!d.link) return "";
  // per-market object
  if(typeof d.link === "object"){
    return d.link[marketTLD] || d.link.com || d.link.default || Object.values(d.link)[0] || "";
  }
  const url = String(d.link).trim();
  if(url==="") return "";
  if(marketTLD==="com") return url;
  // rewrite full amazon product links to the local domain
  const m = url.match(/amazon\.[a-z.]+\/(?:.*?\/)?(?:dp|gp\/product)\/([A-Z0-9]{10})/i);
  if(m){ return "https://www.amazon."+marketTLD+"/dp/"+m[1]; }
  // a.co short links or anything else: leave untouched (OneLink / Amazon handles geo)
  return url;
}

function cardHTML(d,t){
  const link = resolveLink(d);
  const has = link && link.trim()!=="";
  const thumb = d.image && d.image.trim()!=="" ? `<div class="thumb"><img src="${d.image}" alt="${d.title}" loading="lazy"></div>` : `<div class="thumb">${PH}</div>`;
  const tag = `<span class="nichetag">${t[d.niche]}</span>`;
  const btn = has ? `<a class="btn" href="${link}" target="_blank" rel="noopener nofollow sponsored">${t.amazon} ${ARROW}</a>` : `<a class="btn soon" aria-disabled="true">${t.soon}</a>`;
  return `<article class="card" data-niche="${d.niche}">${tag}${thumb}<div class="body"><h3>${d.title}</h3><p>${d.blurb||""}</p>${btn}</div></article>`;
}
function renderGrid(list,gridId,countId,t){
  const vis = list.filter(d=>filter==="all"||d.niche===filter);
  document.getElementById(gridId).innerHTML = vis.map(d=>cardHTML(d,t)).join("") || `<div style="grid-column:1/-1;padding:24px;color:#8a8064;text-align:center;font-size:.9rem">—</div>`;
  const w = vis.length===1?t.design:t.designs;
  document.getElementById(countId).textContent = vis.length+" "+w;
}
function apply(){
  const t = T[lang];
  document.documentElement.lang = lang;
  document.getElementById("tagline").innerHTML = t.tagline_a+"<strong>"+t.tagline_b+"</strong>"+t.tagline_c+"<strong>"+t.tagline_d+"</strong>"+t.tagline_e;
  document.getElementById("h-best").textContent = t.best;
  document.getElementById("h-new").textContent = t.new;
  document.querySelectorAll("#filters button").forEach(b=>{b.textContent=t[b.dataset.f]});
  document.getElementById("fmotto").textContent = t.motto;
  document.getElementById("l-imp").textContent = t.imp;
  document.getElementById("l-priv").textContent = t.priv;
  document.getElementById("l-aff").textContent = t.aff;
  document.getElementById("fnote").textContent = t.aff_note || "All designs are available on Amazon. Borvale is an independent design brand and participates in the Amazon Associates Program; qualifying purchases may earn a commission at no extra cost to you.";
  document.getElementById("cookie-text").textContent = t.cookie;
  document.getElementById("cookie-ok").textContent = t.c_ok;
  document.getElementById("cookie-priv").textContent = t.c_priv;
  renderGrid(BEST,"grid-best","count-best",t);
  renderGrid(NEW,"grid-new","count-new",t);
}
document.getElementById("lang").addEventListener("change",e=>{lang=e.target.value;marketTLD=LANG_TLD[lang]||"com";apply();});
document.getElementById("filters").addEventListener("click",e=>{

  filter=b.dataset.f;
  document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("active",x===b));

});

/* init: detect browser language + region for marketplace */
(function(){
  const supported=["en","de","fr","it","es","ja"];
  const full=(navigator.language||"en").toLowerCase();
  const nav=full.slice(0,2);
  lang = supported.includes(nav)?nav:"en";
  marketTLD = detectInitialMarket(full);
  document.getElementById("lang").value=lang;
  apply(); initCookie();
